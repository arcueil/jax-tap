name: nightly-jax-head

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history to derive version from git tags

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install project + dev deps
        run: uv sync --dev

      - name: Record pinned jax version (pre-upgrade)
        run: |
          PINNED=$(uv run --no-sync python -c "import jax; print(jax.__version__)")
          echo "PINNED_JAX=$PINNED" >> "$GITHUB_ENV"
          echo "pinned jax: $PINNED"

      - name: Install JAX nightly
        run: |
          uv pip install -U \
            --prerelease=allow \
            --index-strategy=unsafe-best-match \
            --extra-index-url https://us-python.pkg.dev/ml-oss-artifacts-published/jax/simple/ \
            jax jaxlib

      - name: Assert head build actually installed
        # Guards against the silent no-op install (leaving the pinned jax in
        # place, which would fake a green canary).  A dev suffix is the normal
        # head signature, but during a RELEASE WINDOW the nightly channel can
        # serve the just-released stable (e.g. 0.11.0 on 2026-07-17, issue
        # #11) — that is still newer than the pin and exactly worth testing,
        # so strictly-newer-than-pinned also passes.
        run: |
          uv run --no-sync python -c "
          import os, re
          import jax
          v = jax.__version__
          pinned = os.environ['PINNED_JAX']
          print('jax', v, '(pinned was', pinned + ')')
          ok = 'dev' in v
          if not ok:
              nums = lambda s: tuple(int(x) for x in re.findall(r'\d+', s)[:3])
              ok = nums(v) > nums(pinned)
          assert ok, f'NOT a head build: {v} (pinned {pinned})'
          "

      - name: Test suite, warnings are errors
        env:
          PYTHONWARNINGS: "error"
        run: uv run --no-sync pytest -q -W error

      - name: Benchmark gate (machinery regression tripwire)
        run: uv run --no-sync python bench/nightly_gate.py

      - name: File canary issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create jax-head-canary --force 2>/dev/null || true
          existing=$(gh issue list --label jax-head-canary --state open --json number --jq length)
          if [ "$existing" = "0" ]; then
            gh issue create \
              --title "nightly canary vs JAX head failed" \
              --label jax-head-canary \
              --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — likely an upstream jax.debug.callback / jaxpr-internals change. Triage before it reaches a JAX release."
          fi
