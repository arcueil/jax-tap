name: publish-stub

# Publishes the `jaxtap` alias/anti-squat metapackage (stub/) to PyPI via
# Trusted Publishing. Manual trigger only — the stub changes ~never.
# One-time setup on pypi.org (pending publisher): project=jaxtap,
# owner=arcueil, repository=jax-tap, workflow=publish-stub.yml, environment=pypi

on:
  workflow_dispatch:

permissions: {}

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
      - name: Build the jaxtap metapackage
        run: uv build stub
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --trusted-publishing always stub/dist/*
